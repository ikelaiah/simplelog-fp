<svg xmlns="http://www.w3.org/2000/svg" width="820" height="240" viewBox="0 0 820 240" role="img" aria-labelledby="title desc">
  <title id="title">SimpleLog-FP logo</title>
  <desc id="desc">A compact Free Pascal logging logo with file and console symbols.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="820" height="240" rx="26" fill="url(#bg)"/>
  <path d="M0 182 C120 138 202 236 342 184 C492 128 610 174 820 94 L820 240 L0 240 Z" fill="#0ea5e9" opacity="0.12"/>
  <path d="M72 44 h216 a22 22 0 0 1 22 22 v108 a22 22 0 0 1 -22 22 H72 a22 22 0 0 1 -22 -22 V66 a22 22 0 0 1 22 -22 Z" fill="#020617" opacity="0.28"/>

  <g filter="url(#shadow)">
    <path d="M116 36 h122 l44 44 v116 H116 Z" fill="url(#page)"/>
    <path d="M238 36 v44 h44 Z" fill="#93c5fd"/>
    <rect x="138" y="82" width="82" height="12" rx="6" fill="#1e3a8a"/>
    <rect x="138" y="116" width="122" height="10" rx="5" fill="#60a5fa"/>
    <rect x="138" y="142" width="96" height="10" rx="5" fill="#22c55e"/>
  </g>

  <g transform="translate(58 130)">
    <rect width="170" height="74" rx="12" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
    <path d="M30 30 l20 16 -20 16" fill="none" stroke="#22c55e" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="68" y="52" width="66" height="7" rx="3.5" fill="#e2e8f0"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="350" y="102" fill="#f8fafc" font-size="48" font-weight="700">SimpleLog-FP</text>
    <text x="353" y="138" fill="#bfdbfe" font-size="20" font-weight="500">simple, lightweight logging for Free Pascal</text>
    <g font-size="16" font-weight="700" text-anchor="middle">
      <rect x="354" y="160" width="82" height="30" rx="15" fill="#2563eb"/>
      <text x="395" y="175" dy=".35em" fill="#eff6ff">INFO</text>
      <rect x="448" y="160" width="112" height="30" rx="15" fill="#f59e0b"/>
      <text x="504" y="175" dy=".35em" fill="#111827">WARNING</text>
      <rect x="572" y="160" width="86" height="30" rx="15" fill="#dc2626"/>
      <text x="615" y="175" dy=".35em" fill="#fff7ed">ERROR</text>
    </g>
  </g>
</svg>
